name: Tests

on:
  - push
  - pull_request

jobs:
  tests:
    name: ${{ matrix.session }} ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python: "3.12", os: "ubuntu-latest", session: "pre-commit" }
          #- { python: "3.12", os: "ubuntu-latest", session: "safety" }
          - { python: "3.12", os: "ubuntu-latest", session: "mypy" }
          - { python: "3.10", os: "ubuntu-latest", session: "tests" }
          - { python: "3.11", os: "ubuntu-latest", session: "tests" }
          - { python: "3.12", os: "ubuntu-latest", session: "tests" }
          - { python: "3.13", os: "ubuntu-latest", session: "tests" }
          #- { python: "3.14", os: "ubuntu-latest", session: "tests" }
          #- { python: "3.12", os: "windows-latest", session: "tests" }
          - { python: "3.13", os: "macos-latest", session: "tests" }
          - { python: "3.10", os: "macos-14", session: "tests" }
          - { python: "3.12", os: "ubuntu-latest", session: "typeguard" }
          #- { python: "3.12", os: "ubuntu-latest", session: "docs" }

    env:
      NOXSESSION: ${{ matrix.session }}
      FORCE_COLOR: "1"
      PRE_COMMIT_COLOR: "always"
      #INSTALL_IMAS: "1"  # SSH agent is broken
      INSTALL_IMAS: "0"

    steps:
      #- name: Set up SSH agent
      #  uses: webfactory/ssh-agent@v0.10.0
      #  with:
      #    ssh-private-key: ${{ secrets.DIPMAS_DEPLOY_KEY }}

      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"
          python-version: ${{ matrix.python }}

      - name: Install uv dependencies (and nox)
        run: uv sync --group test --group dev --python ${{ matrix.python }}

      - name: Upgrade pip in virtual environments
        shell: python
        run: |
          import os
          import pip

          with open(os.environ["GITHUB_ENV"], mode="a") as io:
              print(f"VIRTUALENV_PIP={pip.__version__}", file=io)

      - name: Install Nox
        run: |
          pipx install --pip-args=--constraint=${{ github.workspace }}/.github/workflows/constraints.txt nox
          nox --version

      - name: Compute pre-commit cache key
        if: matrix.session == 'pre-commit'
        id: pre-commit-cache
        shell: python
        run: |
          import hashlib
          import sys
          import os

          python = "py{}.{}".format(*sys.version_info[:2])
          payload = sys.version.encode() + sys.executable.encode()
          digest = hashlib.sha256(payload).hexdigest()
          result = "${{ runner.os }}-{}-{}-pre-commit".format(python, digest[:8])

          with open(os.environ["GITHUB_OUTPUT"], mode="a") as io:
              print(f"result={result}", file=io)

      - name: Restore pre-commit cache
        uses: actions/cache@v5
        if: matrix.session == 'pre-commit'
        with:
          path: ~/.cache/pre-commit
          key: ${{ steps.pre-commit-cache.outputs.result }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ steps.pre-commit-cache.outputs.result }}-

      - name: Run Nox
        run: |
          uv run nox --python=${{ matrix.python }}

      # this may also be done by ciwheelbuild?
      - name: Upload coverage data
        if: always() && matrix.session == 'tests'
        uses: "actions/upload-artifact@v7"
        with:
          name: coverage-data-${{ matrix.python}}-${{ matrix.os }}
          include-hidden-files: true
          path: ".coverage*"

      #- name: Upload documentation
      #  if: matrix.session == 'docs-build'
      #  uses: actions/upload-artifact@v7
      #  with:
      #    name: docs
      #    path: docs/_build

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"
          python-version: "3.12"

      - name: Install uv dependencies (and nox)
        run: uv sync --group test --group dev --python 3.12

      - name: Download coverage data
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage data and display human readable report
        run: |
          uv run nox --session=coverage

      - name: Create coverage report
        run: |
          uv run nox --session=coverage -- xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
